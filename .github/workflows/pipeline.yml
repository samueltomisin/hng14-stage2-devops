name: CI/CD Pipeline

on:
  push:
    branches: ["main", "HNG/stage2-solution"]
  pull_request:
    branches: ["main, HNG/stage2-solution"]


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:

# ════════════════════════════════════════════════════════════════
#  STAGE 1 — LINT
# ════════════════════════════════════════════════════════════════
  lint:
    name: "Stage 1 — Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python — API
        run: flake8 api/main.py --max-line-length=100

      - name: Lint Python — Worker
        run: flake8 worker/worker.py --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Lint JavaScript — Frontend
        run: cd frontend && npm run lint

      - name: Lint Dockerfiles — hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true


# ════════════════════════════════════════════════════════════════
#  STAGE 2 — TEST
# ════════════════════════════════════════════════════════════════
  test:
    name: "Stage 2 — Test"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install \
            fastapi==0.111.0 \
            uvicorn==0.29.0 \
            redis==5.0.4 \
            httpx==0.27.0 \
            pytest \
            pytest-cov

      - name: Run tests with coverage
        run: |
          pytest api/tests/ \
            --cov=api \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


# ════════════════════════════════════════════════════════════════
#  STAGE 3+4 — BUILD AND SECURITY SCAN
# ════════════════════════════════════════════════════════════════
  build-and-scan:
    name: "Stage 3+4 — Build, Push & Security Scan"
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - "5000:5000"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Verify registry is reachable ──────────────────────
      - name: Check registry is up
        run: |
          curl -f http://localhost:5000/v2/ && echo "Registry OK"

      # ── Build images with plain docker build ──────────────
      - name: Build images
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} \
                       -t localhost:5000/api:latest ./api

          docker build -t localhost:5000/worker:${{ github.sha }} \
                       -t localhost:5000/worker:latest ./worker

          docker build -t localhost:5000/frontend:${{ github.sha }} \
                       -t localhost:5000/frontend:latest ./frontend

      # ── Push to local registry ────────────────────────────
      - name: Push images to local registry
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest

          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest

      # ── Verify images exist in registry ───────────────────
      - name: Verify images in registry
        run: |
          curl -f http://localhost:5000/v2/api/tags/list
          curl -f http://localhost:5000/v2/worker/tags/list
          curl -f http://localhost:5000/v2/frontend/tags/list

      # ── Pull FROM registry (graded step) ──────────────────
      - name: Pull images from local registry
        run: |
          docker pull localhost:5000/api:latest
          docker pull localhost:5000/worker:latest
          docker pull localhost:5000/frontend:latest

      # ── Scan with Trivy ───────────────────────────────────
      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "localhost:5000/api:latest"
          format: sarif
          output: trivy-api.sarif
          severity: "CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "localhost:5000/worker:latest"
          format: sarif
          output: trivy-worker.sarif
          severity: "CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "localhost:5000/frontend:latest"
          format: sarif
          output: trivy-frontend.sarif
          severity: "CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"


# ════════════════════════════════════════════════════════════════
#  STAGE 5 — INTEGRATION TEST
# ════════════════════════════════════════════════════════════════
  integration-test:
    name: "Stage 5 — Integration Test"
    runs-on: ubuntu-latest
    needs: build-and-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Build and start full stack
        run: docker compose up --build -d

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for stack to be ready..."
          ELAPSED=0
          until [ "$(docker compose ps --format json | \
            python3 -c "
          import sys, json
          services = [json.loads(l) for l in sys.stdin if l.strip()]
          unhealthy = [s['Name'] for s in services if s.get('Health','') not in ('healthy','')]
          print(len(unhealthy))
          ")" = "0" ]; do
            if [ $ELAPSED -ge 120 ]; then
              echo "Stack never became healthy"
              docker compose logs
              exit 1
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          echo "All services healthy"

      - name: Run integration test script
        run: bash scripts/integration_test.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()   # runs whether test passed or failed
        run: docker compose down -v


# ════════════════════════════════════════════════════════════════
#  STAGE 6 — DEPLOY (main branch only)
# ════════════════════════════════════════════════════════════════
  deploy:
    name: "Stage 6 — Deploy"
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env
        run: cp .env.example .env

      - name: Build fresh images for deploy
        run: docker compose build

      - name: Run rolling deploy
        run: bash scripts/rolling_deploy.sh

      - name: Verify stack is running
        run: docker compose ps